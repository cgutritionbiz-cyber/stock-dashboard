name: Update Stock Prices & News

on:
  schedule:
    - cron: '0 20 * * 0-4'
    - cron: '30 0 * * 1-5'
    - cron: '30 5 * * 1-5'
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Commit and push prices.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.js
          git diff --cached --quiet && echo "No changes" || git commit -m "auto: update prices $(date -u '+%Y-%m-%d %H:%M UTC')" && git push
